      // Cambio CAMPO (2D) tramite bottoni: fino a MAX_CAMPI_ATTIVI (2) campi
      // possono restare attivi insieme. Ri-cliccare un campo attivo lo
      // spegne; se se ne sceglie un terzo mentre 2 sono gia' attivi, i due
      // precedenti si spengono e si riparte da zero col nuovo.
      function selezionaCampo(campo) {
        const giaAttivo = campiAttivi.includes(campo);

        if (giaAttivo) {
          campiAttivi = campiAttivi.filter((c) => c !== campo);
          if (DESCRITTORI_CAMPO[campo]) {
            spegniCampoTemporale(campo);
            sincronizzaENavigaA(istanteCorrenteMs());
          }
        } else {
          chiudiTutteLeFinestreGrafico(); // apertura di un nuovo campo: pulizia delle finestre stazione aperte
          if (campiAttivi.length >= MAX_CAMPI_ATTIVI) {
            campiAttivi.forEach((c) => {
              if (DESCRITTORI_CAMPO[c]) spegniCampoTemporale(c);
            });
            campiAttivi = [];
          }
          campiAttivi.push(campo);
          if (DESCRITTORI_CAMPO[campo]) accendiCampoTemporale(campo);
        }

        bottoniCampo.forEach((b) =>
          b.classList.toggle("attivo", campiAttivi.includes(b.dataset.campo)),
        );
        aggiornaColorbar();

        // Il bottone Animazione ha senso solo con almeno un campo temporale
        // attivo (radar/riflettivita/fulmini); per le stazioni non si applica.
        const temporaliAttivi = campiAttivi.some((c) => DESCRITTORI_CAMPO[c]);
        bottoneAnimazione.disabled = !temporaliAttivi;
        if (!temporaliAttivi) fermaAnimazione();
        else if (animazioneAttiva) riallineaFinestraAnimazione();
      }

      bottoniCampo.forEach((b) =>
        b.addEventListener("click", () => selezionaCampo(b.dataset.campo)),
      );

      // --- Animazione: loop sugli ultimi N minuti di un campo attivo.
      // Non ha senso per le stazioni (1D): riguarda solo i campi temporali
      // (radar/riflettivita/fulmini).
      const ANIMAZIONE_FINESTRA_MIN = 90; // N: quanti minuti indietro copre il loop
      const ANIMAZIONE_INTERVALLO_MS = 500; // ~2 frame al secondo
      const ANIMAZIONE_CONTROLLO_NOVITA_MS = 15000; // ogni quanto, durante il loop, controllo nuovi frame (solo se sul bordo "live")

      let animazioneAttiva = false;
      let animazioneTimerFrame = null;
      let animazioneTimerNovita = null;
      let finestraAnimazione = []; // istanti (ms) della finestra corrente, ordinati
      let posizioneAnimazione = 0; // indice corrente dentro finestraAnimazione
      let animazioneSuBordoLive = false; // true se il bordo destro e' il dato piu' recente
      let animazioneBordoDestro = null; // ultimo bordo destro (ms) usato

      // Ricalcola la finestra [bordoDestro - N minuti, bordoDestro] a partire
      // dalla lista istanti condivisa gia' costruita (listaIstanti).
      function costruisciFinestraAnimazione(bordoDestro) {
        const bordoSinistro = bordoDestro - ANIMAZIONE_FINESTRA_MIN * 60 * 1000;
        finestraAnimazione = listaIstanti.filter(
          (t) => t >= bordoSinistro && t <= bordoDestro,
        );
        animazioneBordoDestro = bordoDestro;
      }

      // Ricalcola la finestra sullo stesso bordo destro di prima (utile se
      // cambia l'insieme dei campi attivi mentre l'animazione e' in corso,
      // es. se ne disattivi uno lasciandone un altro): mantiene la posizione
      // piu' vicina possibile a quella che si stava mostrando.
      function riallineaFinestraAnimazione() {
        const istanteMostrato = finestraAnimazione[posizioneAnimazione];
        costruisciFinestraAnimazione(animazioneBordoDestro);
        if (!finestraAnimazione.length) {
          fermaAnimazione();
          return;
        }

        let nuovaPosizione = 0;
        let differenzaMigliore = Infinity;
        finestraAnimazione.forEach((t, i) => {
          const differenza = Math.abs(t - istanteMostrato);
          if (differenza < differenzaMigliore) {
            differenzaMigliore = differenza;
            nuovaPosizione = i;
          }
        });
        posizioneAnimazione = nuovaPosizione;

        const indice = listaIstanti.indexOf(
          finestraAnimazione[posizioneAnimazione],
        );
        if (indice >= 0) mostraIstante(indice);
      }

      function avviaAnimazione() {
        if (!campiAttivi.some((c) => DESCRITTORI_CAMPO[c])) return;
        if (!listaIstanti.length) return;

        const bordoDestro = istanteCorrenteMs();
        costruisciFinestraAnimazione(bordoDestro);
        if (!finestraAnimazione.length) return;

        // "Sul bordo live" = il bordo destro scelto e' il dato piu' recente
        // disponibile: solo in questo caso ha senso controllare
        // periodicamente l'arrivo di nuovi frame (una data nel passato non
        // fara' mai comparire nuovi frame dentro la sua finestra, fissa).
        animazioneSuBordoLive =
          bordoDestro >= listaIstanti[listaIstanti.length - 1];

        posizioneAnimazione = 0;
        animazioneAttiva = true;
        bottoneAnimazione.classList.add("attivo");
        bottoneAnimazioneIcona.src =
          "{{ url_for('static', filename='icone/pausa.svg') }}";

        mostraIstante(listaIstanti.indexOf(finestraAnimazione[0]));

        animazioneTimerFrame = setInterval(
          animazioneAvanzaFrame,
          ANIMAZIONE_INTERVALLO_MS,
        );
        if (animazioneSuBordoLive) {
          animazioneTimerNovita = setInterval(
            animazioneControllaNovita,
            ANIMAZIONE_CONTROLLO_NOVITA_MS,
          );
        }
      }

      function fermaAnimazione() {
        animazioneAttiva = false;
        bottoneAnimazione.classList.remove("attivo");
        bottoneAnimazioneIcona.src =
          "{{ url_for('static', filename='icone/play.svg') }}";
        clearInterval(animazioneTimerFrame);
        clearInterval(animazioneTimerNovita);
        animazioneTimerFrame = null;
        animazioneTimerNovita = null;
      }

      function animazioneAvanzaFrame() {
        if (!finestraAnimazione.length) return;
        posizioneAnimazione =
          (posizioneAnimazione + 1) % finestraAnimazione.length;
        const indice = listaIstanti.indexOf(
          finestraAnimazione[posizioneAnimazione],
        );
        if (indice >= 0) mostraIstante(indice);
      }

      // Stessa logica di raccolta dati di aggiornaListaSeNovita, ma qui non
      // si salta subito all'ultimo istante: la finestra (di durata fissa)
      // si sposta in avanti, e il loop riprende dal primo istante nuovo,
      // non da dove si trovava nel giro precedente (che potrebbe essere
      // ovunque nella vecchia finestra, per via del giro continuo).
      function animazioneControllaNovita() {
        const campiTemporali = campiAttivi.filter((c) => DESCRITTORI_CAMPO[c]);
        if (!campiTemporali.length) return;

        Promise.all(
          campiTemporali.map((campo) =>
            fetch(urlListaCampo(campo))
              .then((r) => r.json())
              .then((info) => ({ campo, info }))
              .catch(() => null),
          ),
        ).then((risultati) => {
          if (!animazioneAttiva) return; // fermata nel frattempo

          let cambiato = false;
          risultati.forEach((risultato) => {
            if (!risultato || !risultato.info.totale) return;
            const { campo, info } = risultato;
            const precedente = listaFrameCampo[campo];
            const ultimoNoto = precedente
              ? precedente.nomi[precedente.nomi.length - 1]
              : undefined;
            const ultimoNuovo = info.nomi[info.nomi.length - 1];
            if (
              precedente &&
              info.totale === precedente.totale &&
              ultimoNuovo === ultimoNoto
            ) {
              return;
            }
            listaFrameCampo[campo] = {
              nomi: info.nomi,
              bounds: info.bounds || null,
              totale: info.totale,
            };
            cachePrecaricamento[campo] = new Map();
            cambiato = true;
          });
          if (!cambiato) return;

          const vecchioBordoDestro = animazioneBordoDestro;
          costruisciListaIstanti();
          if (!listaIstanti.length) return;

          // Finestra di durata fissa: il nuovo bordo destro e' il nuovo
          // ultimo istante disponibile, quello sinistro lo segue di conseguenza.
          costruisciFinestraAnimazione(listaIstanti[listaIstanti.length - 1]);

          // Riprendo dal primo istante nuovo (successivo al vecchio bordo
          // destro), non da dove si trovava il loop nel suo giro precedente.
          let posizioneRipresa = finestraAnimazione.findIndex(
            (t) => t > vecchioBordoDestro,
          );
          if (posizioneRipresa < 0)
            posizioneRipresa = finestraAnimazione.length - 1;
          posizioneAnimazione = posizioneRipresa;

          const indice = listaIstanti.indexOf(
            finestraAnimazione[posizioneAnimazione],
          );
          if (indice >= 0) mostraIstante(indice);
        });
      }

      bottoneAnimazione.addEventListener("click", () => {
        if (animazioneAttiva) fermaAnimazione();
        else avviaAnimazione();
      });

      bottoneColorbar.addEventListener("click", () => {
        colorbarVisibile = !colorbarVisibile;
        bottoneColorbar.classList.toggle("attivo", colorbarVisibile);
        bottoneColorbarIcona.src = colorbarVisibile
          ? "{{ url_for('static', filename='icone/on.svg') }}"
          : "{{ url_for('static', filename='icone/off.svg') }}";
        aggiornaColorbar();
      });

      const bottoneLayer = document.getElementById("bottoneLayer");
      const modaleLayer = document.getElementById("modaleLayer");
      bottoneLayer.addEventListener("click", () => {
        modaleLayer.hidden = false;
        bottoneLayer.classList.add("attivo");
      });
      document
        .getElementById("modaleLayerChiudi")
        .addEventListener("click", () => {
          modaleLayer.hidden = true;
          bottoneLayer.classList.remove("attivo");
        });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && !modaleLayer.hidden) {
          modaleLayer.hidden = true;
          bottoneLayer.classList.remove("attivo");
        }
      });
      rendiTrascinabile(
        modaleLayer.querySelector(".modale-finestra"),
        modaleLayer.querySelector(".titolo-popup"),
      );

      // All'avvio nessuna serie è selezionata: la mappa parte senza pallini.
      // I pallini compaiono quando l'utente sceglie una serie.

      // Ape animata: parte da sola a un istante casuale (1-30 minuti da
      // ora), resta attiva per la durata di un ciclo della gif, poi torna
      // statica e ne pianifica un'altra, sempre a distanza casuale.
      const apeWrapper = document.querySelector(".ape-hover");
      const DURATA_APE_GIF_MS = 4950; // durata di un ciclo di ape.gif

      function pianificaApeAnimata() {
        const attesaMs = (1 + Math.random() * 4) * 60 * 1000; // 1-5 minuti
        setTimeout(() => {
          apeWrapper.classList.add("ape-attiva");
          setTimeout(() => {
            apeWrapper.classList.remove("ape-attiva");
            pianificaApeAnimata();
          }, DURATA_APE_GIF_MS);
        }, attesaMs);
      }

      if (apeWrapper) pianificaApeAnimata();
    </script>
  </body>
</html>
